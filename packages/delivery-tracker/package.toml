[package]
id = "delivery-tracker"
name = "배송 조회"
version = "1.0.0"
description = "택배 배송 상태를 주기적으로 확인해 변경 사항이 있을 때만 텔레그램으로 알려줍니다."
author = "KittyPaw Team"
category = "utility"
tags = ["delivery", "telegram", "schedule", "sweettracker"]
setup_notes = "텔레그램 봇과 스마트택배 API 키가 필요합니다."

[trigger]
type = "schedule"
cron = "0 */2 * * *"

[permissions]
primitives = ["Http", "Telegram", "Storage"]
allowed_hosts = ["info.sweettracker.co.kr"]

[[config.fields]]
key = "telegram_token"
label = "텔레그램 봇 토큰"
type = "secret"
required = true
setup_guide = "1. 텔레그램에서 @BotFather 를 검색\n2. /newbot 명령어 입력\n3. 봇 이름과 username 설정\n4. 받은 토큰을 여기에 붙여넣기"

[[config.fields]]
key = "chat_id"
label = "텔레그램 채팅 ID"
type = "string"
required = true
setup_guide = "1. 만든 봇에게 아무 메시지를 보내기\n2. @userinfobot 에게 메시지를 보내면 채팅 ID 확인 가능"

[[config.fields]]
key = "carrier"
label = "택배사"
type = "select"
required = true
options = ["CJ대한통운", "한진택배", "롯데택배", "우체국"]

[[config.fields]]
key = "tracking_number"
label = "운송장 번호"
type = "string"
required = true

[[config.fields]]
key = "api_key"
label = "스마트택배 API 키"
type = "secret"
required = true
setup_guide = "1. info.sweettracker.co.kr 가입\n2. API 키 발급 신청\n3. 받은 키를 여기에 붙여넣기"
