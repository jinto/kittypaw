[meta]
id = "airkorea"
name = "AirKorea 대기질"
version = "1.0.0"
description = "한국 실시간 대기질 데이터 (에어코리아)"

[[config]]
key = "api_url"
label = "API Server URL"
source = "kittypaw-api/api_url"
default = "http://localhost:8080"

[[config]]
key = "access_token"
label = "API Token"
type = "secret"
source = "kittypaw-api/access_token"

[[config]]
key = "station_name"
label = "기본 측정소"
default = "종로구"

[permissions]
primitives = ["Http"]
allowed_hosts = ["localhost", "127.0.0.1"]
context = ["locale"]
