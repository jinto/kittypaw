[package]
id = "weather-briefing"
name = "날씨 브리핑"
version = "1.0.0"
description = "매일 아침 설정한 도시의 날씨 예보를 가져와 자연어로 브리핑해줍니다."
author = "KittyPaw Team"
category = "weather"
tags = ["weather", "telegram", "daily", "llm", "open-meteo"]
setup_notes = "이 스킬을 사용하려면 텔레그램 봇이 필요합니다. 아래 단계를 따라 설정하세요."

[trigger]
type = "schedule"
cron = "0 7 * * *"

[permissions]
primitives = ["Http", "Telegram", "Llm"]
allowed_hosts = ["api.open-meteo.com"]

[[config.fields]]
key = "telegram_token"
label = "텔레그램 봇 토큰"
type = "secret"
required = true
setup_guide = "1. 텔레그램에서 @BotFather 를 검색\n2. /newbot 명령어 입력\n3. 봇 이름과 username 설정\n4. 받은 토큰을 여기에 붙여넣기"

[[config.fields]]
key = "chat_id"
label = "텔레그램 채팅 ID"
type = "string"
required = true
setup_guide = "1. 만든 봇에게 아무 메시지를 보내기\n2. @userinfobot 에게 메시지를 보내면 채팅 ID 확인 가능"

[[config.fields]]
key = "city"
label = "City Name (display only)"
type = "string"
required = false
default = "Seoul"

[[config.fields]]
key = "latitude"
label = "위도"
type = "string"
required = false
default = "37.57"

[[config.fields]]
key = "longitude"
label = "경도"
type = "string"
required = false
default = "126.98"

[[config.fields]]
key = "schedule"
label = "Cron Schedule"
type = "cron"
required = false
default = "0 7 * * *"
