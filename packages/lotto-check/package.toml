[package]
id = "lotto-check"
name = "로또 당첨 확인"
version = "1.0.0"
description = "매주 토요일 저녁 로또 당첨 번호를 자동으로 조회해 내 번호와 비교한 결과를 텔레그램으로 알려줍니다."
author = "KittyPaw Team"
category = "entertainment"
tags = ["lotto", "telegram", "schedule", "lottery"]
setup_notes = "이 스킬을 사용하려면 텔레그램 봇이 필요합니다. 아래 단계를 따라 설정하세요."

[trigger]
type = "schedule"
cron = "0 21 * * 6"

[permissions]
primitives = ["Http", "Telegram"]
allowed_hosts = ["www.dhlottery.co.kr"]

[[config.fields]]
key = "telegram_token"
label = "텔레그램 봇 토큰"
type = "secret"
required = true
setup_guide = "1. 텔레그램에서 @BotFather 를 검색\n2. /newbot 명령어 입력\n3. 봇 이름과 username 설정\n4. 받은 토큰을 여기에 붙여넣기"

[[config.fields]]
key = "chat_id"
label = "텔레그램 채팅 ID"
type = "string"
required = true
setup_guide = "1. 만든 봇에게 아무 메시지를 보내기\n2. @userinfobot 에게 메시지를 보내면 채팅 ID 확인 가능"

[[config.fields]]
key = "my_numbers"
label = "내 로또 번호"
type = "string"
required = true
hint = "쉼표로 구분된 6개 번호 (예: 3,8,15,23,29,42)"
