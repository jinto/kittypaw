[package]
id = "url-monitor"
name = "URL 모니터"
version = "1.0.0"
description = "주기적으로 URL 접속을 확인하고, 상태가 바뀌면 텔레그램으로 알려줍니다."
author = "KittyPaw Team"
category = "devops"
tags = ["monitoring", "uptime", "telegram", "storage", "alert"]
setup_notes = "이 스킬을 사용하려면 텔레그램 봇이 필요합니다. 아래 단계를 따라 설정하세요."

[trigger]
type = "schedule"
cron = "*/5 * * * *"

[permissions]
primitives = ["Http", "Telegram", "Storage"]
allowed_hosts = ["*"]

[[config.fields]]
key = "telegram_token"
label = "텔레그램 봇 토큰"
type = "secret"
required = true
setup_guide = "1. 텔레그램에서 @BotFather 를 검색\n2. /newbot 명령어 입력\n3. 봇 이름과 username 설정\n4. 받은 토큰을 여기에 붙여넣기"

[[config.fields]]
key = "chat_id"
label = "텔레그램 채팅 ID"
type = "string"
required = true
setup_guide = "1. 만든 봇에게 아무 메시지를 보내기\n2. @userinfobot 에게 메시지를 보내면 채팅 ID 확인 가능"

[[config.fields]]
key = "target_url"
label = "URL to Monitor"
type = "string"
required = true

[[config.fields]]
key = "schedule"
label = "Cron Schedule"
type = "cron"
required = false
default = "*/5 * * * *"
