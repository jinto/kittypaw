[package]
id = "air-quality"
name = "미세먼지 알림"
version = "1.0.0"
description = "매일 아침 미세먼지/초미세먼지 등급을 확인하고 텔레그램으로 알려줍니다."
author = "KittyPaw Team"
category = "health"
tags = ["air", "dust", "health", "telegram", "korea"]
setup_notes = "텔레그램 봇과 에어코리아 API 키가 필요합니다."

[trigger]
type = "schedule"
cron = "0 7 * * *"

[permissions]
primitives = ["Http", "Telegram"]
allowed_hosts = ["apis.data.go.kr"]

[[config.fields]]
key = "telegram_token"
label = "텔레그램 봇 토큰"
type = "secret"
required = true
setup_guide = "1. 텔레그램에서 @BotFather 를 검색\n2. /newbot 명령어 입력\n3. 봇 이름과 username 설정\n4. 받은 토큰을 여기에 붙여넣기"

[[config.fields]]
key = "chat_id"
label = "텔레그램 채팅 ID"
type = "string"
required = true
setup_guide = "1. 만든 봇에게 아무 메시지를 보내기\n2. @userinfobot 에게 메시지를 보내면 채팅 ID 확인 가능"

[[config.fields]]
key = "api_key"
label = "에어코리아 API 키 (data.go.kr)"
type = "secret"
required = true
hint = "data.go.kr에서 '한국환경공단_에어코리아_대기오염정보' API 키를 발급받으세요"
setup_guide = "1. data.go.kr 회원가입\n2. '한국환경공단_에어코리아_대기오염정보' 검색\n3. 활용 신청 후 API 키 발급\n4. 받은 키를 여기에 붙여넣기"

[[config.fields]]
key = "station"
label = "측정소명"
type = "string"
required = false
default = "종로구"
hint = "가까운 측정소명 (예: 종로구, 강남구, 해운대구)"

[[config.fields]]
key = "schedule"
label = "Cron Schedule"
type = "cron"
required = false
default = "0 7 * * *"
