name = "kittypaw-relay"
main = "src/index.ts"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "MESSAGES"
id = "e451443f9a944cf597275cd1deb2bdc4"
preview_id = "e451443f9a944cf597275cd1deb2bdc4"

[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "KittyPawSession"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KittyPawSession", "RateLimiter"]

[vars]
# WEBHOOK_SECRET is set via `wrangler secret put WEBHOOK_SECRET`
DAILY_LIMIT = "10000"
MONTHLY_LIMIT = "100000"
CHANNEL_URL = "https://pf.kakao.com/_exjFdX/chat"
