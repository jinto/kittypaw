services:
  postgres-test:
    image: postgres:17-alpine
    container_name: kittypaw-postgres-test
    environment:
      POSTGRES_USER: kittypaw
      POSTGRES_PASSWORD: kittypaw
      POSTGRES_DB: kittypaw_api_test
    ports:
      - "15432:5432"
    volumes:
      - ./docker/init-pg.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kittypaw -d kittypaw_api_test"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data  # ephemeral — fresh on every up
