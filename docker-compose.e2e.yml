services:
  postgres-e2e:
    image: postgres:17-alpine
    container_name: kitty-postgres-e2e
    environment:
      POSTGRES_USER: kittypaw
      POSTGRES_PASSWORD: kittypaw
      POSTGRES_DB: kitty_e2e_test
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kittypaw -d kitty_e2e_test"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
