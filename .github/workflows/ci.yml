name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout official skills
        uses: actions/checkout@v4
        with:
          repository: kittypaw-app/skills
          path: official-skills

      - name: Link official skills for cross-repo tests
        run: ln -sfn "$GITHUB_WORKSPACE/official-skills" "$GITHUB_WORKSPACE/../skills"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -count=1 -timeout 120s
