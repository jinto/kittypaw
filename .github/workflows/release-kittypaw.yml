name: Release Kittypaw

on:
  push:
    tags:
      - "kittypaw/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/kittypaw

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.work
            apps/kittypaw/go.sum

      - name: Build archives
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#kittypaw/v}"
          DIST="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST"

          build_unix() {
            os="$1"
            arch="$2"
            outdir="$(mktemp -d)"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -ldflags "-s -w -X main.version=${VERSION}" -o "$outdir/kittypaw" ./cli
            tar -C "$outdir" -czf "$DIST/kittypaw_${os}_${arch}.tar.gz" kittypaw
            rm -rf "$outdir"
          }

          build_windows() {
            arch="$1"
            outdir="$(mktemp -d)"
            GOOS=windows GOARCH="$arch" CGO_ENABLED=0 \
              go build -ldflags "-s -w -X main.version=${VERSION}" -o "$outdir/kittypaw.exe" ./cli
            (cd "$outdir" && zip -q "$DIST/kittypaw_windows_${arch}.zip" kittypaw.exe)
            rm -rf "$outdir"
          }

          build_unix linux amd64
          build_unix linux arm64
          build_unix darwin amd64
          build_unix darwin arm64
          build_windows amd64
          build_windows arm64

          cp install.sh "$DIST/install.sh"
          (cd "$DIST" && sha256sum kittypaw_* install.sh > checksums.txt)

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#kittypaw/v}"
          DIST="$GITHUB_WORKSPACE/dist"
          NOTES="$RUNNER_TEMP/kittypaw-release-notes.md"
          cat > "$NOTES" <<EOF
          ## Install

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/${REPO}/main/install.sh | sh
          \`\`\`

          Set \`VERSION=${VERSION}\` to install this version explicitly.
          EOF

          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$DIST"/* --clobber --repo "$REPO"
          else
            gh release create "$TAG_NAME" "$DIST"/* \
              --repo "$REPO" \
              --title "Kittypaw v${VERSION}" \
              --notes-file "$NOTES"
          fi

  sign-macos:
    needs: release
    runs-on: macos-15
    if: success()
    steps:
      - name: Check signing secrets
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            DEVELOPER_ID_CERT_BASE64 \
            DEVELOPER_ID_CERT_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_ID \
            APPLE_APP_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required signing secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Setup signing keychain
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign and notarize darwin binaries
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          IDENTITY="Developer ID Application: JAE KWON PARK (${APPLE_TEAM_ID})"

          for ARCH in amd64 arm64; do
            ASSET="kittypaw_darwin_${ARCH}.tar.gz"
            WORKDIR="$(mktemp -d)"

            echo "=== Signing ${ASSET} ==="

            gh release download "$TAG" --pattern "$ASSET" --dir "$WORKDIR" --repo "$REPO"
            tar xzf "${WORKDIR}/${ASSET}" -C "$WORKDIR"

            codesign --sign "$IDENTITY" --options runtime --timestamp --force "${WORKDIR}/kittypaw"
            codesign --verify --verbose "${WORKDIR}/kittypaw"

            ditto -c -k "${WORKDIR}/kittypaw" "${WORKDIR}/kittypaw-notarize.zip"
            set +e
            SUBMIT_OUT=$(xcrun notarytool submit "${WORKDIR}/kittypaw-notarize.zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait 2>&1)
            SUBMIT_STATUS=$?
            set -e
            echo "$SUBMIT_OUT"

            if [ "$SUBMIT_STATUS" -ne 0 ] || echo "$SUBMIT_OUT" | grep -Eq "Invalid|Rejected"; then
              SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep "id:" | head -1 | awk '{print $2}')
              if [ -n "$SUBMISSION_ID" ]; then
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
              fi
              exit 1
            fi

            tar czf "${WORKDIR}/${ASSET}" -C "$WORKDIR" kittypaw
            gh release upload "$TAG" "${WORKDIR}/${ASSET}" --clobber --repo "$REPO"

            echo "=== ${ASSET} done ==="
            rm -rf "$WORKDIR"
          done

      - name: Update checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          WORKDIR="$(mktemp -d)"

          gh release download "$TAG" --dir "$WORKDIR" --repo "$REPO" \
            --pattern "kittypaw_*" --pattern "install.sh"

          cd "$WORKDIR"
          shasum -a 256 kittypaw_* install.sh > checksums.txt
          gh release upload "$TAG" checksums.txt --clobber --repo "$REPO"
          rm -rf "$WORKDIR"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
